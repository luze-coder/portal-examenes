<mat-card class="mt15 examen-card" *ngFor="let e of examenes">

  <mat-card-header>
    <mat-card-title>
      {{ e.titulo }}
    </mat-card-title>
    <mat-card-subtitle>
      {{ e.categoria.titulo }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>

    <!-- 📊 Información del examen -->
    <div class="info-examen">

      <div class="info-item">
        <strong>Puntos máximos:</strong> {{ e.puntosMaximos }}
      </div>

      <div class="info-item">
        <strong>Puntos para aprobar:</strong> {{ e.puntosAprobacion }}
      </div>

      <div class="info-item">
        <strong>Preguntas:</strong> {{ e.numeroDePreguntas }}
      </div>

      <div class="info-item">
        <strong>Tiempo:</strong>
        {{ (e.tiempoMaximoMinutos && e.tiempoMaximoMinutos > 0)
        ? e.tiempoMaximoMinutos
        : (e.numeroDePreguntas * 2) }} min
      </div>

    </div>

    <!-- 🎛 Botones -->
    <div class="acciones-examen">

      <button mat-flat-button color="primary" [routerLink]="'/admin/ver-preguntas/'+e.examenId+'/'+e.titulo">
        Preguntas
      </button>

      <button mat-flat-button color="accent" [routerLink]="'/admin/examen/'+e.examenId">
        Actualizar
      </button>

      <button mat-flat-button color="primary">
        Intentos
      </button>

      <button mat-flat-button color="warn" (click)="eliminarExamen(e.examenId)">
        Eliminar
      </button>

    </div>

  </mat-card-content>

</mat-card>

<div class="container text-center mt30">
  <button routerLink="/admin/add-examen" mat-raised-button color="primary">
    Agregar cuestionario
  </button>
</div>
